<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Builder — Visual Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ==================== TOP TOOLBAR ==================== -->
    <header class="toolbar">
        <div class="toolbar-left">
            <div class="toolbar-brand">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                <span>Email Builder</span>
            </div>
            <div class="toolbar-divider"></div>
            <button class="tool-btn" id="undo-btn" type="button" title="Undo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            </button>
            <button class="tool-btn" id="redo-btn" type="button" title="Redo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
            </button>
        </div>
        <div class="toolbar-center">
            <input type="text" id="email-title" value="My Email" class="title-input">
            <button class="snap-toggle" id="snap-toggle" type="button" title="Toggle Grid Snap">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Snap
            </button>
        </div>
        <div class="toolbar-right">
            <div class="device-toggle">
                <button class="active" data-view="desktop" type="button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    Desktop
                </button>
                <button data-view="mobile" type="button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                    Mobile
                </button>
            </div>
            <div class="toolbar-divider"></div>
            <button class="action-btn btn-green" id="download-btn" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download
            </button>
            <button class="action-btn btn-blue" id="copy-btn" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy HTML
            </button>
        </div>
    </header>

    <!-- ==================== MAIN LAYOUT ==================== -->
    <div class="editor-layout">

        <!-- LEFT PANEL — BLOCK LIBRARY -->
        <aside class="panel panel-left" id="panel-left">
            <div class="panel-section">
                <h3 class="panel-title">Add Blocks</h3>
                <div class="block-grid" id="block-grid">
                    <button class="block-item" data-type="text" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
                        <span>Text</span>
                    </button>
                    <button class="block-item" data-type="image" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        <span>Image</span>
                    </button>
                    <button class="block-item" data-type="button" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="8" rx="4"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
                        <span>Button</span>
                    </button>
                    <button class="block-item" data-type="divider" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg>
                        <span>Divider</span>
                    </button>
                    <button class="block-item" data-type="spacer" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 8 12 3 17 8"/><polyline points="7 16 12 21 17 16"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                        <span>Spacer</span>
                    </button>
                    <button class="block-item" data-type="hero" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="2" y1="9" x2="22" y2="9"/></svg>
                        <span>Hero</span>
                    </button>
                    <button class="block-item" data-type="columns" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                        <span>2-Column</span>
                    </button>
                    <button class="block-item" data-type="social" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                        <span>Social</span>
                    </button>
                    <!-- NEW BLOCKS -->
                    <button class="block-item" data-type="threeCol" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                        <span>3-Column</span>
                    </button>
                    <button class="block-item" data-type="video" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        <span>Video</span>
                    </button>
                    <button class="block-item" data-type="quote" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/></svg>
                        <span>Quote</span>
                    </button>
                    <button class="block-item" data-type="list" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                        <span>List</span>
                    </button>
                    <button class="block-item" data-type="countdown" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <span>Countdown</span>
                    </button>
                    <button class="block-item" data-type="footer" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="2" y1="15" x2="22" y2="15"/></svg>
                        <span>Footer</span>
                    </button>
                    <button class="block-item" data-type="logoHeader" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><line x1="2" y1="9" x2="22" y2="9"/><circle cx="7" cy="6" r="1.5"/></svg>
                        <span>Header</span>
                    </button>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-title">Templates</h3>
                <div class="template-list">
                    <button class="template-item" data-tpl="welcome" type="button">
                        <div class="template-preview tpl-welcome"></div>
                        <span>Welcome</span>
                    </button>
                    <button class="template-item" data-tpl="promo" type="button">
                        <div class="template-preview tpl-promo"></div>
                        <span>Promo</span>
                    </button>
                    <button class="template-item" data-tpl="newsletter" type="button">
                        <div class="template-preview tpl-newsletter"></div>
                        <span>Newsletter</span>
                    </button>
                    <button class="template-item" data-tpl="onboarding" type="button">
                        <div class="template-preview tpl-onboarding"></div>
                        <span>Onboarding</span>
                    </button>
                    <button class="template-item" data-tpl="product-launch" type="button">
                        <div class="template-preview tpl-product-launch"></div>
                        <span>Product Launch</span>
                    </button>
                    <button class="template-item" data-tpl="event-invite" type="button">
                        <div class="template-preview tpl-event-invite"></div>
                        <span>Event Invite</span>
                    </button>
                    <button class="template-item" data-tpl="thank-you" type="button">
                        <div class="template-preview tpl-thank-you"></div>
                        <span>Thank You</span>
                    </button>
                    <button class="template-item" data-tpl="abandoned-cart" type="button">
                        <div class="template-preview tpl-abandoned-cart"></div>
                        <span>Abandoned Cart</span>
                    </button>
                    <button class="template-item" data-tpl="feedback" type="button">
                        <div class="template-preview tpl-feedback"></div>
                        <span>Feedback</span>
                    </button>
                    <button class="template-item" data-tpl="holiday-sale" type="button">
                        <div class="template-preview tpl-holiday-sale"></div>
                        <span>Holiday Sale</span>
                    </button>
                    <button class="template-item" data-tpl="password-reset" type="button">
                        <div class="template-preview tpl-password-reset"></div>
                        <span>Password Reset</span>
                    </button>
                    <button class="template-item" data-tpl="order-confirm" type="button">
                        <div class="template-preview tpl-order-confirm"></div>
                        <span>Order Confirm</span>
                    </button>
                    <button class="template-item" data-tpl="re-engagement" type="button">
                        <div class="template-preview tpl-re-engagement"></div>
                        <span>Re-engage</span>
                    </button>
                    <button class="template-item" data-tpl="referral" type="button">
                        <div class="template-preview tpl-referral"></div>
                        <span>Referral</span>
                    </button>
                    <button class="template-item" data-tpl="minimal" type="button">
                        <div class="template-preview tpl-minimal"></div>
                        <span>Minimal</span>
                    </button>
                </div>
            </div>

            <div class="panel-section">
                <h3 class="panel-title">Email Settings</h3>
                <div class="setting-group">
                    <label>Canvas Background</label>
                    <div class="color-row">
                        <input type="color" id="canvas-bg" value="#f4f4f5">
                        <span class="color-label" id="canvas-bg-label">#f4f4f5</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Content Width</label>
                    <select id="content-width">
                        <option value="600" selected>600px (Standard)</option>
                        <option value="640">640px (Wide)</option>
                        <option value="500">500px (Compact)</option>
                    </select>
                </div>
            </div>
        </aside>

        <!-- CENTER — CANVAS -->
        <main class="canvas-area" id="canvas-area">
            <div class="canvas-scroll">
                <div class="canvas" id="canvas" style="max-width:600px;">
                    <div class="canvas-empty" id="canvas-empty">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <h3>Start building your email</h3>
                        <p>Click a block on the left to add it, or load a template to get started. Drag blocks freely to any position!</p>
                    </div>
                    <!-- Blocks render here -->
                </div>
            </div>
        </main>

        <!-- RIGHT PANEL — PROPERTIES -->
        <aside class="panel panel-right" id="panel-right">
            <div id="props-empty" class="props-empty">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <h4>No block selected</h4>
                <p>Click a block on the canvas to edit its properties.</p>
            </div>
            <div id="props-panel" class="props-panel" style="display:none;"></div>
        </aside>

    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- HIDDEN FILE INPUT FOR IMAGE BLOCKS -->
    <input type="file" id="hidden-file-input" accept="image/*" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
